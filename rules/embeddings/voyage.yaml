# rules/embeddings/voyage.yaml — Voyage AI embedding models.
pack: voyage
version: 1
rules:
  # voyage-3, voyage-3-large, voyage-3-lite, voyage-code-3, voyage-finance-2, etc.
  - id: voyage/model-literal
    kind: embedding-model
    provider: voyage
    languages: [python, javascript, typescript, go, java, rust, csharp, kotlin]
    keywords: ["voyage-"]
    pattern: '["''](?P<model>voyage-[\w.\-]+)["'']'
    regions: [code, string]
    claim: { name: "${model}" }
    confidence: 0.85

  # SDK surface: voyageai.Client(...) / vo.embed(...).
  - id: voyage/embed-call
    kind: library
    provider: voyage
    languages: [python, javascript, typescript, go, java, rust, csharp, kotlin]
    keywords: ["voyageai", "vo.embed"]
    pattern: '\bvoyageai\.Client\s*\(|\bvo\.embed\s*\('
    regions: [code]
    claim: { name: "voyageai-sdk" }
    confidence: 0.7
