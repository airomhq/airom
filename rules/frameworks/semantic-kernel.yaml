# rules/frameworks/semantic-kernel.yaml — Microsoft Semantic Kernel usage.
pack: semantic-kernel
version: 1
rules:
  # Python module (semantic_kernel) or C# namespace (Microsoft.SemanticKernel).
  - id: semantic-kernel/import
    kind: framework
    provider: semantic-kernel
    languages: [python, csharp]
    keywords: ["semantic_kernel", "Microsoft.SemanticKernel"]
    pattern: '(?:\b(?:import|from)\s+semantic_kernel[\w.]*|\busing\s+Microsoft\.SemanticKernel[\w.]*)'
    regions: [code]
    claim: { name: "semantic-kernel" }
    confidence: 0.7

  # Kernel builder construction (C# fluent API).
  - id: semantic-kernel/kernel-builder
    kind: framework
    provider: semantic-kernel
    languages: [csharp]
    keywords: ["Kernel.CreateBuilder"]
    pattern: '\bKernel\.CreateBuilder\s*\('
    regions: [code]
    claim: { name: "semantic-kernel" }
    confidence: 0.7
