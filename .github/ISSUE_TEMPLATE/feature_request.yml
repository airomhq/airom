name: Feature request
description: A new detector, source, output format, or capability.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        New detectors are the most common request. If you're proposing one,
        tell us the **evidence** it keys on (file names, import paths, config
        keys) — that's what determines whether it fits the declarative rule
        model. See `docs/ARCHITECTURE.md` §6.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't AIROM discover or express today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should it detect/emit, and from what evidence?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New detector / rule pack
        - New source (fs / repo / image / k8s / ...)
        - New output format
        - Mapping / schema conformance
        - Performance
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
