name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$out"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # v7+ is required for golangci-lint v2 configs (.golangci.yml is v2).
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          # The .golangci.yml depguard rules enforce the §4 import-direction law.

  generate:
    name: Generated code is current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go generate
        run: go generate ./...
      - name: No diff (regenerate & commit if this fails)
        run: git diff --exit-code || (echo "::error::generated files are stale — run 'go generate ./...'"; exit 1)

  test:
    name: Test (race)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test with the race detector
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

  build-matrix:
    name: Cross-compile (CGO_ENABLED=0)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Proves invariant P8: the release binary builds statically for every
      # target with no CGO. A regression that reintroduces a C dependency
      # fails here, not at release time.
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/airom

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Short burst of every Fuzz* target (binary parsers eat untrusted
      # bytes, §13). Committed testdata/fuzz corpora are the regression seeds.
      - name: Fuzz targets (15s each)
        run: make fuzz FUZZ_TIME=15s
