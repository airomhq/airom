version: 2
updates:
  # Go module dependencies. Grouped so a routine bump week is one PR, not ten.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]

  # The actions pinned in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
